name: Deploy Prospra

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prospra-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROSPRA_HOST }}
          username: ${{ secrets.PROSPRA_USERNAME }}
          key: ${{ secrets.PROSPRA_SSH_KEY }}
          port: ${{ secrets.PROSPRA_PORT }}
          command_timeout: 30m
          script: |
            set -e

            cd /var/www/prospra
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            npm ci
            npm run build

            pm2 restart prospra --update-env || pm2 start npm --name "prospra" -- start
            pm2 save